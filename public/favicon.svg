<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Arkaplan -->
  <rect width="512" height="512" rx="110" fill="#080B14"/>
  
  <!-- Glow efekti (arka mor hale) -->
  <circle cx="256" cy="240" r="160" fill="url(#glowGradient)" opacity="0.15"/>
  
  <!-- Bulutlar (altta) -->
  <ellipse cx="170" cy="380" rx="90" ry="28" fill="url(#cloudGradient)" opacity="0.25"/>
  <ellipse cx="310" cy="395" rx="110" ry="24" fill="url(#cloudGradient)" opacity="0.20"/>
  <ellipse cx="256" cy="370" rx="140" ry="32" fill="url(#cloudGradient)" opacity="0.18"/>

  <!-- Hilal Ay -->
  <circle cx="268" cy="220" r="110" fill="url(#moonGradient)"/>
  <circle cx="316" cy="195" r="88" fill="#080B14"/>

  <!-- Yıldızlar -->
  <!-- Büyük yıldız (sağ üst) -->
  <g transform="translate(370, 130)">
    <polygon points="0,-12 3,-4 11,-4 5,2 7,10 0,5 -7,10 -5,2 -11,-4 -3,-4" fill="#C4B5FD" opacity="0.95"/>
  </g>
  <!-- Orta yıldız (sol) -->
  <g transform="translate(130, 200)">
    <polygon points="0,-8 2,-3 7,-3 3,1 5,7 0,4 -5,7 -3,1 -7,-3 -2,-3" fill="#DDD6FE" opacity="0.80"/>
  </g>
  <!-- Küçük yıldız (üst sol) -->
  <g transform="translate(185, 100)">
    <polygon points="0,-6 1.5,-2 5,-2 2.5,1 3.5,5 0,3 -3.5,5 -2.5,1 -5,-2 -1.5,-2" fill="#EDE9FE" opacity="0.70"/>
  </g>
  <!-- Minik yıldız (sağ alt) -->
  <g transform="translate(400, 280)">
    <polygon points="0,-5 1,-2 4,-2 2,1 3,4 0,2.5 -3,4 -2,1 -4,-2 -1,-2" fill="#A78BFA" opacity="0.60"/>
  </g>
  <!-- Nokta yıldızlar -->
  <circle cx="148" cy="310" r="3" fill="#C4B5FD" opacity="0.50"/>
  <circle cx="390" cy="170" r="2.5" fill="#DDD6FE" opacity="0.55"/>
  <circle cx="420" cy="230" r="2" fill="#EDE9FE" opacity="0.45"/>

  <!-- Gradientler -->
  <defs>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#080B14"/>
    </radialGradient>
    <linearGradient id="moonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
  </defs>
</svg>